<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengantar Pendalaman HTML</title>
    <style>
        body {
            background-color: black;
            color: white;
        }

        img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <!-- ini adalah paragraf -->
    <p>ini adalah paragraf</p>

    <!-- ini adalah HEading -->
    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
    <h4>Heading 4</h4>
    <h5>Heading 5</h5>
    <h6>Heading 6</h6>

    <!-- ini adalah List -->
    <!-- Unordered List -->
    <ul>
        <li><h1>ITEM 1</h1></li>
        <li>Item 2</li>
        <!-- Nested List -->
        <li>
            <ul>
                <li>Item 3</li>
                <li>Item 4</li>
            </ul>
        </li>
    </ul>

    <!-- Ordered List -->
    <ol type="1"> <!-- type="1" untuk angka, type="A" untuk huruf kapital, type="a" untuk huruf kecil, type="I" untuk angka romawi kapital, type="i" untuk angka romawi kecil -->
        <li>Item 1</li>
        <li>Item 2</li>
        <!-- Nested List -->
        <li>
            <ol>
                <li>Item 3</li>
                <li>Item 4</li>
            </ol>
        </li>
    </ol>

    <!-- ini adalah gambar -->
    <img src="wkwkwk.png" alt="gammbar pemandangan">
    <img src="https://raw.githubusercontent.com/dicodingacademy/BelajarDasarPemrogramanWeb/099-shared-files/dicoding-logo.png" alt="Logo Dicoding" height="100px">
</body>
</html>
