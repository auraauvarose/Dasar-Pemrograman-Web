<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        body {
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Table</h1>
    <table border="1">
        <tr>
            <th>Nama</th>
            <th>Umur</th>
            <th>Jenis Kelamin</th>
        </tr>       
        <tr>
            <td>Aura</td>
            <td>20</td>
            <td>Perempuan</td>
        </tr>
        <tr>
            <td>Auvarose</td>
            <td>20</td>
            <td>Perempuan</td>   
        </tr>
    </table>

    <!-- Column Spans -->
    <h2>Column Spans</h2>
    <table border="1">
        <tr>
            <th>Nama</th>
            <th>Umur</th>            
        </tr>
        <tr>
            <td colspan="2">Aura</td>
        </tr>
        <tr>
            <td colspan="2">Auvarose</td>
        </tr>
    </table>

     <table>
        <tr>
          <th>Negara</th>
          <td>Indonesia</td>
        </tr>
        <tr>
          <th>Hari jadi</th>
          <td>25 September 1810</td>
        </tr>
        <tr>
          <th>Luas Total</th>
          <td>167.67 km<sup>2</sup></td>
        </tr>
        <tr>
          <th>Bahasa Daerah</th>
          <td>Sunda</td>
        </tr>
        <tr>
          <th>Kode Telepon</th>
          <td>+62 22</td>
        </tr>
      </table>
</body>
</html>
